<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 가족 구성원일까?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FFF8FC;font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.wrap{max-width:460px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.hidden{display:none!important;}

.intro-img{width:100%;max-width:340px;display:block;margin:0 auto .75rem;border-radius:20px;box-shadow:0 6px 24px rgba(200,140,200,.2);}
.intro-tag{display:inline-block;font-size:11px;background:#FFE4ED;color:#D4537E;padding:4px 14px;border-radius:999px;margin-bottom:10px;font-weight:700;}
.intro-title{font-size:22px;font-weight:700;color:#3a3a3a;line-height:1.45;text-align:center;}
.intro-sub{font-size:13px;color:#aaa;text-align:center;margin-top:6px;line-height:1.7;}
.intro-chips{display:flex;gap:8px;justify-content:center;margin:1rem 0 1.5rem;flex-wrap:wrap;}
.chip{font-size:12px;padding:5px 13px;border-radius:999px;font-weight:500;}
.chip-pink{background:#FFE4ED;color:#D4537E;}
.chip-yellow{background:#FFF3D4;color:#B07A00;}
.chip-mint{background:#D6F5EC;color:#0F6E56;}

.prog-wrap{margin-bottom:1rem;}
.prog-track{height:7px;background:#F0EEF8;border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#F7A8C4,#A89FE8);border-radius:999px;transition:width .4s ease;}
.prog-meta{display:flex;justify-content:space-between;margin-top:5px;}
.prog-meta span{font-size:11px;color:#bbb;}

.char-row{display:flex;align-items:flex-end;gap:0;margin-bottom:.6rem;}
.char-wrap{flex-shrink:0;width:110px;}
.char-img{width:110px;height:110px;object-fit:cover;display:block;border-radius:50%;border:3px solid #F7D6E8;transition:opacity .25s;}
.bubble-wrap{flex:1;padding-left:12px;}
.bubble{background:#fff;border:2px solid #F0E6F8;border-radius:18px 18px 18px 4px;padding:12px 15px;position:relative;}
.bubble::before{content:'';position:absolute;left:-10px;bottom:16px;border-width:6px 10px 6px 0;border-style:solid;border-color:transparent #F0E6F8 transparent transparent;}
.bubble::after{content:'';position:absolute;left:-7px;bottom:17px;border-width:5px 8px 5px 0;border-style:solid;border-color:transparent #fff transparent transparent;}
.char-name{font-size:10px;color:#C4A0D8;font-weight:700;margin-bottom:4px;}
.q-text{font-size:14.5px;font-weight:700;color:#3a3a3a;line-height:1.6;}

.opts{display:flex;flex-direction:column;gap:9px;margin-top:.75rem;}
.opt{background:#fff;border:2px solid #F0EEF8;border-radius:14px;padding:11px 14px;font-size:13.5px;color:#555;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;line-height:1.45;font-family:inherit;}
.opt-alpha{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:#F0EEF8;color:#A89FE8;}
.opt:hover{border-color:#CCC6F0;background:#F8F6FF;}
.opt.sel{border-color:#A89FE8;background:#F3F0FF;color:#3a3a3a;}
.opt.sel .opt-alpha{background:#A89FE8;color:#fff;}

.nav{display:flex;gap:10px;margin-top:.75rem;}
.btn-prev{background:#fff;border:2px solid #EEE8F8;border-radius:14px;padding:11px 18px;font-size:13px;color:#bbb;cursor:pointer;font-family:inherit;}
.btn-prev:hover{background:#F8F6FF;}
.btn-next{flex:1;background:linear-gradient(135deg,#C4B8F0,#F7A8C4);border:none;border-radius:14px;padding:12px;font-size:14px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit;transition:opacity .15s;letter-spacing:.3px;}
.btn-next:disabled{opacity:.35;cursor:not-allowed;}
.btn-next:not(:disabled):hover{opacity:.85;}

.result-scene{width:100%;max-width:380px;display:block;margin:0 auto 1rem;border-radius:20px;box-shadow:0 6px 24px rgba(200,140,200,.2);transition:opacity .4s;}

.result-label{font-size:12px;color:#ccc;margin-bottom:4px;}
.result-name{font-size:23px;font-weight:700;color:#3a3a3a;margin-bottom:.25rem;}
.result-sub{font-size:13px;color:#A89FE8;font-weight:500;margin-bottom:1rem;}
.result-card{background:#fff;border:2px solid #F7E8F3;border-radius:24px;padding:1.25rem;margin-bottom:.75rem;}
.result-desc{font-size:13.5px;color:#666;line-height:1.9;}
.result-tips{margin-top:1rem;display:flex;flex-direction:column;gap:8px;}
.tip-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#888;background:#FAF7FF;padding:9px 12px;border-radius:10px;line-height:1.5;}

.btn-retry{width:100%;background:#fff;border:2px solid #EEE8F8;border-radius:14px;padding:12px;font-size:13px;color:#bbb;cursor:pointer;font-family:inherit;margin-top:.5rem;}
.btn-retry:hover{background:#F8F6FF;}
.btn-view{width:100%;background:linear-gradient(135deg,#F7A8C4,#C4B8F0);border:none;border-radius:14px;padding:12px;font-size:14px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit;margin-top:.5rem;letter-spacing:.3px;}
.btn-view:hover{opacity:.85;}
.stats-card{background:#fff;border:2px solid #F7E8F3;border-radius:24px;padding:1.25rem;margin-top:.75rem;}
.stats-title{font-size:14px;font-weight:700;color:#3a3a3a;margin-bottom:.25rem;text-align:center;}
.stats-total{font-size:12px;color:#bbb;text-align:center;margin-bottom:1rem;}
.bar-row{margin-bottom:12px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:4px;}
.bar-track{height:10px;background:#F0EEF8;border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .8s ease;}
.btn-retry:hover{background:#F8F6FF;}
.btn-start{width:100%;background:linear-gradient(135deg,#C4B8F0,#F7A8C4);border:none;border-radius:18px;padding:15px;font-size:15px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit;letter-spacing:.3px;}
.btn-start:hover{opacity:.88;}
</style>
</head>

  {name:"선택적 연결형",sub:"🔗 필요에 따라 관계를 조율하는 사람",
    desc:"가족과의 관계를 유지하지만 항상 가까이 두지는 않습니다.\n자신의 삶을 중심에 두면서도 필요한 순간에는 자연스럽게 연결됩니다.\n당신에게 가족은 언제든 돌아갈 수 있는 안정적인 기반입니다.",
    tips:[{icon:"🎯",text:"균형 잡힌 거리 감각을 가진 당신"},{icon:"📱",text:"가끔은 먼저 안부를 건네보는 것도 좋습니다"}]},
  {name:"거리 조절형",sub:"🌙 관계의 밀도를 스스로 조절하는 사람",
    desc:"자주 연결되기보다는 편안한 거리를 유지하는 것을 선호합니다.\n감정적인 소모를 줄이고 자신의 삶의 균형을 중요하게 생각합니다.\n그래서 관계도 필요한 만큼만 유지하는 편입니다.",
    tips:[{icon:"🛡️",text:"자신을 잘 지키는 당신"},{icon:"💌",text:"한 번쯤은 먼저 다가가도 괜찮습니다"}]}
];

let cur=0, answers=new Array(7).fill(null);

function startTest(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('test').classList.remove('hidden');
  renderQ();
}

function renderQ(){
  const q=QS[cur];
  const pct=Math.round((cur/7)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=(cur+1)+' / 7';
  document.getElementById('prog-pct').textContent=pct+'%';
  const img=document.getElementById('char-img');
  img.style.opacity='0';
  setTimeout(()=>{img.src=QIMGS[cur];img.style.opacity='1';},200);
  document.getElementById('char-name').textContent=QNAMES[cur];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('btn-prev').style.display=cur===0?'none':'';
  document.getElementById('btn-next').textContent=cur===6?'결과 보기 ✨':'다음 →';
  document.getElementById('btn-next').disabled=answers[cur]===null;
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'+(answers[cur]===i?' sel':'');
    btn.innerHTML='<span class="opt-alpha">'+['A','B','C','D'][i]+'</span><span>'+q.emoji[i]+' '+o+'</span>';
    btn.onclick=()=>selectOpt(i);
    opts.appendChild(btn);
  });
}

function selectOpt(i){
  answers[cur]=i;
  document.querySelectorAll('.opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
  document.getElementById('btn-next').disabled=false;
}
function nextQ(){if(answers[cur]===null)return;if(cur<6){cur++;renderQ();}else showResult();}
function prevQ(){if(cur>0){cur--;renderQ();}}

function showResult(){
  const scores=[0,0,0,0];
  answers.forEach((a,qi)=>{if(a!==null)scores[a]+=QS[qi].w;});
  const max=Math.max(...scores);
  const sorted=[...scores].sort((a,b)=>b-a);
  let idx;
  if(max>=5&&(max-sorted[1])>=2){idx=scores.indexOf(max);}
  else{idx=scores.map((s,i)=>(({s,i}))).sort((a,b)=>b.s-a.s)[0].i;}
  const t=TYPES[idx];
  document.getElementById('test').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  const scene=document.getElementById('r-scene');
  scene.style.opacity='0';
  scene.src=SCENES[idx];
  scene.onload=()=>{scene.style.opacity='1';};
  
  document.getElementById('r-name').textContent=t.name;
  document.getElementById('r-sub').textContent=t.sub;
  document.getElementById('r-desc').innerHTML=t.desc.replace(/\n/g,'<br>');
  const tips=document.getElementById('r-tips');
  tips.innerHTML=t.tips.map(tip=>'<div class="tip-item"><span>'+tip.icon+'</span><span>'+tip.text+'</span></div>').join('');
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbzs7gefZ5UhleecIaWZrX1vonCyjvABuDF5Yki_fC8aBfv39AShCvm87l9lRYCdhRQp/exec";

function submitResult(resultName, answersArr){
  const labels = ['A','B','C','D'];
  fetch(GAS_URL, {
    method:'POST',
    body: JSON.stringify({
      result: resultName,
      answers: answersArr.map(a => labels[a])
    })
  }).catch(()=>{});
}

function loadStats(){
  const wrap = document.getElementById('stats-wrap');
  wrap.classList.remove('hidden');
  document.getElementById('stats-total').textContent = '불러오는 중...';
  document.getElementById('stats-bars').innerHTML = '';

  fetch(GAS_URL)
    .then(r=>r.json())
    .then(data=>{
      const total = data.total;
      document.getElementById('stats-total').textContent = `총 ${total}명 참여`;
      const types = ["연결 주도형","균형 설계형","선택적 연결형","거리 조절형"];
      const colors = ["#F7A8C4","#9FE1CB","#A89FE8","#FAC775"];
      let barsHtml = '';
      types.forEach((t,i)=>{
        const cnt = data.counts[t] || 0;
        const pct = total > 0 ? Math.round(cnt/total*100) : 0;
        barsHtml += `
          <div class="bar-row">
            <div class="bar-label"><span>${t}</span><span>${pct}% (${cnt}명)</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i]};"></div></div>
          </div>`;
      });
      document.getElementById('stats-bars').innerHTML = barsHtml;
    })
    .catch(()=>{
      document.getElementById('stats-total').textContent = '데이터를 불러올 수 없습니다.';
    });
}

function resetTest(){
  cur=0;answers=new Array(7).fill(null);
  document.getElementById('result').classList.add('hidden');
  document.getElementById('stats-wrap').classList.add('hidden');
  document.getElementById('intro').classList.remove('hidden');
}
</script>
